<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

/* PAGE 3 */

#page3{
position:absolute;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

/* VIDEO */

#birthdayVideo{
width:100%;
height:100vh;
object-fit:cover;
}

/* PAGE 4 */

#page4{
position:absolute;
top:0;
left:0;
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
background:black;
}

#muskanImage{
width:100%;
height:100vh;
object-fit:cover;
}

</style>

</head>


<body>


<!-- PAGE 3 -->

<div id="page3">

<video id="birthdayVideo" autoplay muted playsinline>

<source src="megumi.mp4" type="video/mp4">

</video>

</div>



<!-- PAGE 4 -->

<div id="page4">

<img id="muskanImage" src="mayanak.jpg">

</div>



<script>

const video = document.getElementById("birthdayVideo");

video.onended = function(){

document.getElementById("page3").style.display = "none";

document.getElementById("page4").style.display = "flex";

};

</script>


</body>
</html>
